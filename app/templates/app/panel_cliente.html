<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis pedidos</title>
</head>
<body>
    <h1>Bienvenido, {{ request.user.first_name }}</h1>
    <h2>Mis pedidos</h2>
    {% if pedidos %}
        <table>
            <tr>
                <th>Código</th>
                <th>Fecha</th>
                <th>Estado</th>
                <th>Detalle</th>
            </tr>
            {% for pedido in pedidos %}
            <tr>
                <td>{{ pedido.codigo_pedido }}</td>
                <td>{{ pedido.fecha }}</td>
                <td>{{ pedido.estado }}</td>
                <td><a href="{% url 'detalle_pedido' pedido.codigo_pedido %}">Ver detalle</a></td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>No tienes pedidos registrados.</p>
    {% endif %}
    <form method="POST" action="{% url 'logout' %}">
    {% csrf_token %}
    <button type="submit">Cerrar sesión</button>
</form>
</body>
</html>
